<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VicioTV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0b0f;
  --surface:  #111318;
  --surface2: #181c24;
  --border:   #1f2330;
  --red:      #e31c1c;
  --red-dim:  #7a0f0f;
  --amber:    #d97706;
  --muted:    #5a6077;
  --text:     #e8eaf2;
  --text-dim: #8891aa;
  --radius:   10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* ── HEADER ── */
header { position: sticky; top: 0; z-index: 100; background: rgba(10,11,15,0.94); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); padding: 0 24px; }
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 20px; height: 62px; }
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 26px; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
.logo span { color: var(--red); }
.search-wrap { flex: 1; max-width: 400px; position: relative; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
#search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 8px 12px 8px 36px; outline: none; transition: border-color .2s; }
#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--red); }
.live-pill { display: flex; align-items: center; gap: 6px; background: var(--red-dim); border: 1px solid var(--red); border-radius: 20px; padding: 4px 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; white-space: nowrap; margin-left: auto; }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(.7); } }

/* ── TV TABS ── */
.tv-tabs { display: flex; gap: 4px; flex-shrink: 0; }
.tv-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: .5px; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: background .15s, color .15s, border-color .15s; white-space: nowrap; }
.tv-tab:hover { background: var(--border); color: var(--text); }
.tv-tab.active { background: var(--red); border-color: var(--red); color: #fff; }
#tv2-screen { display: none; }

/* ── TICKER ── */
.ticker-bar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; height: 36px; overflow: hidden; position: sticky; top: 62px; z-index: 99; }
.ticker-label { display: flex; align-items: center; gap: 7px; padding: 0 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 12px; letter-spacing: 1.5px; color: #fff; background: var(--red); height: 100%; white-space: nowrap; flex-shrink: 0; }
.ticker-track-wrap { flex: 1; overflow: hidden; height: 100%; }
.ticker-track { display: flex; align-items: center; height: 100%; white-space: nowrap; will-change: transform; animation: ticker-scroll 20s linear infinite; }
.ticker-track:hover { animation-play-state: paused; }
.ticker-item { display: inline-flex; align-items: center; gap: 8px; padding: 0 20px; font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; transition: color .15s; border-right: 1px solid var(--border); }
.ticker-item:hover { color: var(--red); }
.ticker-item-status { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 1px; padding: 2px 5px; border-radius: 3px; }
.ticker-item-status.live { background: var(--red); color: #fff; }
.ticker-item-status.upcoming { background: var(--amber); color: #fff; }
.ticker-sep { display: inline-block; color: var(--muted); padding: 0 6px; user-select: none; }

/* ── CONTAINER ── */
.container { max-width: 1400px; margin: 0 auto; padding: 24px 24px 60px; }

/* ── PLAYER ROW ── */
.player-row { display: grid; grid-template-columns: 1fr 300px; gap: 16px; margin-bottom: 28px; align-items: start; }
.player-shell { background: #000; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.player-ratio { position: relative; width: 100%; padding-top: 56.25%; }
.player-ratio iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.player-idle { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: radial-gradient(ellipse at 50% 60%, #151924 0%, #0a0b0f 100%); }
.player-idle-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); }
.player-idle p { color: var(--muted); font-size: 14px; text-align: center; padding: 0 20px; }
.player-info { padding: 11px 16px; display: flex; align-items: center; gap: 10px; background: var(--surface); border-top: 1px solid var(--border); min-height: 48px; }
.player-info-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-info-cat { font-size: 11px; color: var(--red); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.player-info-idle { color: var(--muted); font-size: 13px; }
.btn-fullscreen { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); border-radius: 6px; padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 500; white-space: nowrap; transition: background .15s, color .15s; flex-shrink: 0; }
.btn-fullscreen:hover { background: var(--border); color: var(--text); }

/* ── LIVE SIDEBAR ── */
.live-sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
.live-sidebar-head { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.live-sidebar-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: .5px; flex: 1; }
.live-sidebar-count { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 1px 8px; }
.live-sidebar-list { overflow-y: auto; flex: 1; }
.live-sidebar-list::-webkit-scrollbar { width: 4px; }
.live-sidebar-list::-webkit-scrollbar-track { background: transparent; }
.live-sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.mini-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .15s; position: relative; }
.mini-card:last-child { border-bottom: none; }
.mini-card:hover { background: var(--surface2); }
.mini-card.selected { background: rgba(227,28,28,.08); }
.mini-card.selected::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--red); border-radius: 0 2px 2px 0; }
.mini-thumb { position: relative; width: 88px; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; background: var(--surface2); flex-shrink: 0; }
.mini-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mini-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; }
.mini-live-dot { position: absolute; top: 4px; left: 4px; width: 6px; height: 6px; border-radius: 50%; background: var(--red); box-shadow: 0 0 5px var(--red); animation: pulse 1.4s ease-in-out infinite; }
.mini-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.5); opacity: 0; transition: opacity .15s; border-radius: 6px; }
.mini-card:hover .mini-play { opacity: 1; }
.mini-info { flex: 1; min-width: 0; }
.mini-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.mini-cat { font-size: 10px; color: var(--red); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }

/* ── STATS ── */
.stats-bar { display: flex; gap: 24px; margin-bottom: 22px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 26px; line-height: 1; }
.stat-num.red { color: var(--red); }
.stat-num.amber { color: var(--amber); }
.stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

/* ── SECTION HEADINGS ── */
.section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; margin-top: 30px; }
.section-head:first-of-type { margin-top: 0; }
.section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; }
.section-count { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; }
.section-line { flex: 1; height: 1px; background: var(--border); }

/* ── GRIDS ── */
.events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }

/* ── CARD ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform .2s, border-color .2s, box-shadow .2s; display: flex; flex-direction: column; user-select: none; }
.card:hover { transform: translateY(-3px); border-color: #2e3450; box-shadow: 0 10px 28px rgba(0,0,0,.5); }
.card.is-live { border-color: var(--red-dim); }
.card.is-live:hover { border-color: var(--red); }
.card.selected { border-color: var(--red) !important; box-shadow: 0 0 0 2px var(--red-dim); }
.poster-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: var(--surface2); overflow: hidden; }
.poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
.card:hover .poster-wrap img { transform: scale(1.04); }
.poster-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.45); opacity: 0; transition: opacity .2s; }
.card:hover .play-overlay { opacity: 1; }
.play-circle { width: 42px; height: 42px; border-radius: 50%; background: rgba(227,28,28,.85); display: flex; align-items: center; justify-content: center; }
.badge { position: absolute; top: 8px; left: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 1.5px; padding: 3px 7px; border-radius: 4px; z-index: 2; }
.badge.live { background: var(--red); color: #fff; }
.badge.upcoming { background: rgba(217,119,6,.9); color: #fff; }
.badge.ended { background: rgba(90,96,119,.7); color: #ccc; }
.card-body { padding: 11px 13px 13px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
.card-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; line-height: 1.2; }
.card-cat { font-size: 11px; font-weight: 600; color: var(--red); text-transform: uppercase; letter-spacing: .5px; }
.card-time { font-size: 11px; color: var(--text-dim); margin-top: auto; padding-top: 4px; }

/* ── STATES ── */
.state-msg { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 15px; }
.spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.no-results { color: var(--text-dim); font-size: 14px; padding: 40px 0; text-align: center; grid-column: 1/-1; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .player-row { grid-template-columns: 1fr; }
  .live-sidebar { max-height: 200px; }
  .live-sidebar-list { flex-direction: row; display: flex; overflow-x: auto; overflow-y: hidden; }
  .mini-card { flex-direction: column; align-items: flex-start; min-width: 140px; border-bottom: none; border-right: 1px solid var(--border); }
  .mini-card:last-child { border-right: none; }
  .mini-thumb { width: 100%; }
  .mini-card.selected::before { top: 0; left: 0; right: 0; bottom: auto; width: auto; height: 3px; border-radius: 0 0 2px 2px; }
}
@media (max-width: 640px) {
  .header-inner { gap: 10px; }
  .logo { font-size: 21px; }
  .live-pill { display: none; }
  .container { padding: 14px 12px 50px; }
  .events-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .card-title { font-size: 13px; }
  .stats-bar { gap: 16px; }
  .ticker-bar { top: 52px; }
}
@media (max-width: 380px) {
  .events-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">VICIO<span>TV</span></div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Buscar eventos, categorías…" autocomplete="off">
    </div>
    <span id="main-header-clock" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--text-dim);letter-spacing:.5px;white-space:nowrap;flex-shrink:0;"></span>
    <div class="tv-tabs">
      <button class="tv-tab active" id="tab-tv1"      onclick="switchTab('tv1')">TV #1</button>
      <button class="tv-tab"        id="tab-tv2"      onclick="switchTab('tv2')">TV #2</button>
      <button class="tv-tab"        id="tab-channels" onclick="switchTab('channels')">📺 Todos los canales</button>
    </div>

  </div>
</header>

<div id="tv1-screen">
<div class="ticker-bar" id="ticker-bar" style="display:none">
  <div class="ticker-label">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    PARTIDOS MUNDIAL
  </div>
  <div class="ticker-track-wrap">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
</div>

<div class="container">

  <div class="player-row">
    <div class="player-shell" id="player-shell">
      <div class="player-ratio" id="player-ratio">
        <div class="player-idle" id="player-idle">
          <div class="player-idle-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <p>Seleccioná un evento para reproducir</p>
        </div>
      </div>
      <div class="player-info">
        <span class="player-info-idle" id="player-info-idle">Ningún evento seleccionado</span>
        <span class="player-info-title" id="player-info-title" style="display:none"></span>
        <span class="player-info-cat"   id="player-info-cat"   style="display:none"></span>
        <button class="btn-fullscreen"  id="btn-fullscreen"    style="display:none" onclick="goFullscreen()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          Pantalla completa
        </button>
      </div>
    </div>

    <div class="live-sidebar" id="live-sidebar" style="display:none">
      <div class="live-sidebar-head">
        <div class="pulse-dot"></div>
        <div class="live-sidebar-title">EN VIVO AHORA</div>
        <div class="live-sidebar-count" id="sidebar-count">0</div>
      </div>
      <div class="live-sidebar-list" id="sidebar-list"></div>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat"><div class="stat-num red"   id="st-live">0</div><div class="stat-label">En Vivo</div></div>
    <div class="stat"><div class="stat-num amber"  id="st-upcoming">0</div><div class="stat-label">Próximos</div></div>
    <div class="stat"><div class="stat-num"        id="st-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div id="upcoming-section" style="display:none">
    <div class="section-head">
      <div class="section-title">🕒 Próximos</div>
      <div class="section-count" id="upcoming-section-count">0</div>
      <div class="section-line"></div>
    </div>
    <div class="events-grid" id="upcoming-grid"></div>
  </div>

  <div id="ended-section" style="display:none">
    <div class="section-head">
      <div class="section-title">Finalizados</div>
      <div class="section-count" id="ended-section-count">0</div>
      <div class="section-line"></div>
    </div>
    <div class="events-grid" id="ended-grid"></div>
  </div>

  <div id="global-state" class="state-msg">
    <div class="spinner"></div>
    Cargando eventos…
  </div>

</div>

</div><!-- /tv1-screen -->

<div id="tv2-screen">
  <iframe id="tv2-iframe" style="width:100%;height:calc(100vh - 62px);border:none;display:block;" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>
</div>

<script>
/* ── TAB SWITCHING ── */
function switchTab(tab) {
  ['tv1','tv2','channels'].forEach(function(t) {
    var btn = document.getElementById('tab-' + t);
    if (btn) btn.classList.toggle('active', t === tab);
  });
  document.getElementById('tv1-screen').style.display = tab === 'tv1' ? 'block' : 'none';
  document.getElementById('tv2-screen').style.display = (tab === 'tv2' || tab === 'channels') ? 'block' : 'none';
}

/* ── STATE ── */
let allEvents  = [];
let searchQuery = '';
let selectedId  = null;

const BLOCKED = ['24/7 South Park','24/7 Cows','24/7 Family Guy','24/7 Familit Guy','24/7 The Simpsons','24/7 SpongeBob Squarepants'];

/* ── HELPERS ── */
function getStatus(ev) {
  const now = Math.floor(Date.now() / 1000);
  if (ev.always_live === 1) return 'live';
  if (now < ev.starts_at)   return 'upcoming';
  if (now >= ev.starts_at && now <= ev.ends_at) return 'live';
  return 'ended';
}
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts * 1000).toLocaleString('es-AR', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function statusLabel(s) { return { live:'EN VIVO', upcoming:'PRÓXIMO', ended:'FINALIZADO' }[s] || s; }

/* ── TICKER ── */
const FLAG_MAP = {
  'argentina':'🇦🇷','brazil':'🇧🇷','brasil':'🇧🇷','spain':'🇪🇸','españa':'🇪🇸',
  'germany':'🇩🇪','alemania':'🇩🇪','france':'🇫🇷','francia':'🇫🇷',
  'england':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','inglaterra':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','italy':'🇮🇹','italia':'🇮🇹',
  'portugal':'🇵🇹','netherlands':'🇳🇱','holland':'🇳🇱','holanda':'🇳🇱',
  'usa':'🇺🇸','united states':'🇺🇸','mexico':'🇲🇽','méxico':'🇲🇽',
  'colombia':'🇨🇴','uruguay':'🇺🇾','chile':'🇨🇱','peru':'🇵🇪','perú':'🇵🇪',
  'ecuador':'🇪🇨','venezuela':'🇻🇪','paraguay':'🇵🇾','bolivia':'🇧🇴',
  'canada':'🇨🇦','canadá':'🇨🇦','japan':'🇯🇵','south korea':'🇰🇷','korea':'🇰🇷',
  'morocco':'🇲🇦','marruecos':'🇲🇦','senegal':'🇸🇳','nigeria':'🇳🇬',
  'cameroon':'🇨🇲','ghana':'🇬🇭','ivory coast':'🇨🇮','saudi arabia':'🇸🇦',
  'iran':'🇮🇷','australia':'🇦🇺','croatia':'🇭🇷','croacia':'🇭🇷','serbia':'🇷🇸',
  'poland':'🇵🇱','polonia':'🇵🇱','denmark':'🇩🇰','dinamarca':'🇩🇰',
  'switzerland':'🇨🇭','suiza':'🇨🇭','belgium':'🇧🇪','bélgica':'🇧🇪',
  'sweden':'🇸🇪','suecia':'🇸🇪','turkey':'🇹🇷','turquía':'🇹🇷',

function getTeamsWithFlags(name) {
  // Split into two teams on common separators
  const match = name.match(/^(.+?)\s+(?:vs\.?|at|v|@|-)\s+(.+)$/i);
  if (!match) {
    // No separator found — just try to find any flag
    const flags = getFlags(name);
    return flags ? `${flags} ${name}` : name;
  }
  const keys = Object.keys(FLAG_MAP).sort((a,b) => b.length - a.length);
  function flagFor(part) {
    const lower = part.toLowerCase().trim();
    for (const k of keys) { if (lower.includes(k)) return FLAG_MAP[k]; }
    return '';
  }
  const team1 = match[1].trim();
  const team2 = match[2].trim();
  const sep   = name.match(/\s+(vs\.?|at|v|@|-)\s+/i)?.[1] || 'vs';
  const f1 = flagFor(team1);
  const f2 = flagFor(team2);
  return `${f1 ? f1 + ' ' : ''}${team1} ${sep} ${team2}${f2 ? ' ' + f2 : ''}`;
}

function timeUntil(ts) {
  const diff = ts - Math.floor(Date.now() / 1000);
  if (diff <= 0) return null;
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  return h > 0 ? `en ${h}h ${m}m` : `en ${m}m`;
}

function buildTicker(events) {
  const bar   = document.getElementById('ticker-bar');
  const track = document.getElementById('ticker-track');
  const football = events.filter(e => (e.category_name || e.category || '') === 'Football');
  if (!football.length) { bar.style.display = 'none'; return; }

  football.sort((a,b) => ({live:0,upcoming:1,ended:2}[getStatus(a)] - {live:0,upcoming:1,ended:2}[getStatus(b)]));

  const items = football.map(ev => {
    const status = getStatus(ev);
    if (status === 'ended') return '';
    const label = status === 'live' ? 'EN VIVO' : timeUntil(ev.starts_at);
    if (!label) return '';
    const name    = ev.name || ev.title || '';
    const display = getTeamsWithFlags(name);
    return `<span class="ticker-item" onclick="selectEvent('${ev.id}')"><span class="ticker-item-status ${status}">${label}</span>${display}</span><span class="ticker-sep">·</span>`;
  }).join('');

  if (!items.trim()) { bar.style.display = 'none'; return; }

  // Render one copy first to measure, then duplicate
  track.innerHTML = items;
  bar.style.display = '';

  requestAnimationFrame(() => {
    const singleW = track.scrollWidth;
    // Now duplicate for seamless loop
    track.innerHTML = items + items;
    const speed = Math.max(5, singleW / 133);
    // Inject keyframe with exact pixel value so loop is seamless
    const styleId = 'ticker-kf';
    let styleEl = document.getElementById(styleId);
    if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = styleId; document.head.appendChild(styleEl); }
    styleEl.textContent = `@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-${singleW}px); } }`;
    track.style.animationDuration = `${speed}s`;
  });
}

/* ── SIDEBAR ── */
function syncSidebarHeight() {
  const sidebar = document.getElementById('live-sidebar');
  const shell   = document.getElementById('player-shell');
  if (sidebar && shell && window.innerWidth > 900)
    sidebar.style.height = shell.offsetHeight + 'px';
  else if (sidebar)
    sidebar.style.height = '';
}
window.addEventListener('resize', syncSidebarHeight);

function renderSidebar(liveEvents) {
  const sidebar = document.getElementById('live-sidebar');
  const list    = document.getElementById('sidebar-list');
  if (!liveEvents.length) { sidebar.style.display = 'none'; return; }
  sidebar.style.display = '';
  document.getElementById('sidebar-count').textContent = liveEvents.length;
  list.innerHTML = liveEvents.map(ev => {
    const title = ev.name || ev.title || '';
    const cat   = ev.category_name || ev.category || '';
    const isSel = String(ev.id) === String(selectedId);
    const img   = ev.poster ? `<img src="${ev.poster}" alt="${title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
    const ph    = `<div class="mini-thumb-placeholder" style="${ev.poster?'display:none':''}">${cat||'TV'}</div>`;
    return `<div class="mini-card ${isSel?'selected':''}" data-id="${ev.id}" onclick="selectEvent('${ev.id}')">
      <div class="mini-thumb">${img}${ph}<div class="mini-live-dot"></div><div class="mini-play"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
      <div class="mini-info"><div class="mini-title">${title}</div>${cat?`<div class="mini-cat">${cat}</div>`:''}</div>
    </div>`;
  }).join('');

}

/* ── PLAYER ── */
function loadPlayer(ev) {
  const src   = ev.iframe || null;
  const ratio = document.getElementById('player-ratio');
  ratio.querySelectorAll('iframe').forEach(el => el.remove());
  document.getElementById('player-idle').style.display = 'none';

  if (src) {
    const iframe = document.createElement('iframe');
    try { const u = new URL(src); u.searchParams.set('autoplay','1'); iframe.src = u.toString(); }
    catch(e) { iframe.src = src; }
    iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
    iframe.allowFullscreen = true;
    iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;background:#000';
    ratio.appendChild(iframe);
  } else {
    const idle = document.getElementById('player-idle');
    idle.style.display = '';
    idle.querySelector('p').textContent = getStatus(ev) === 'upcoming'
      ? 'El stream estará disponible cuando comience el evento'
      : 'Reproducción no disponible para este evento';
  }

  const title = ev.name || ev.title || '';
  const cat   = ev.category_name || ev.category || '';
  document.getElementById('player-info-idle').style.display  = 'none';
  document.getElementById('player-info-title').style.display = '';
  document.getElementById('player-info-title').textContent   = title;
  document.getElementById('player-info-cat').style.display   = cat ? '' : 'none';
  document.getElementById('player-info-cat').textContent     = cat;
  document.getElementById('btn-fullscreen').style.display    = src ? '' : 'none';

  selectedId = ev.id;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('selected', String(c.dataset.id) === String(ev.id)));
  document.querySelectorAll('.mini-card').forEach(c => c.classList.toggle('selected', String(c.dataset.id) === String(ev.id)));
  if (window.innerWidth <= 900) document.getElementById('player-shell').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function goFullscreen() {
  const t = document.getElementById('player-shell').querySelector('iframe') || document.getElementById('player-shell');
  (t.requestFullscreen || t.webkitRequestFullscreen || t.mozRequestFullScreen).call(t);
}

/* ── CARD ── */
function cardHTML(ev) {
  const status = getStatus(ev);
  const title  = ev.name || ev.title || 'Sin título';
  const cat    = ev.category_name || ev.category || '';
  const time   = fmtDate(ev.starts_at);
  const isSel  = String(ev.id) === String(selectedId);
  const img    = ev.poster ? `<img src="${ev.poster}" alt="${title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
  const ph     = `<div class="poster-placeholder" style="${ev.poster?'display:none':''}">${cat||'VICIO TV'}</div>`;
  return `<div class="card ${status==='live'?'is-live':''} ${isSel?'selected':''}" data-id="${ev.id}" onclick="selectEvent('${ev.id}')">
    <div class="poster-wrap">${img}${ph}<div class="badge ${status}">${statusLabel(status)}</div><div class="play-overlay"><div class="play-circle"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div></div>
    <div class="card-body"><div class="card-title">${title}</div>${cat?`<div class="card-cat">${cat}</div>`:''}${time?`<div class="card-time">${time}</div>`:''}</div>
  </div>`;
}

function selectEvent(id) {
  const ev = allEvents.find(e => String(e.id) === String(id));
  if (ev) loadPlayer(ev);
}

/* ── RENDER ── */
function applyFilters() {
  const q = searchQuery.toLowerCase().trim();
  return allEvents.filter(ev => {
    if (!q) return true;
    const name = (ev.name || ev.title || '').toLowerCase();
    const cat  = (ev.category_name || ev.category || '').toLowerCase();
    return name.includes(q) || cat.includes(q);
  });
}

function setGrid(id, events) {
  const el = document.getElementById(id);
  el.innerHTML = events.length ? events.map(cardHTML).join('') : '<div class="no-results">Sin resultados.</div>';
}

function render() {
  const filtered = applyFilters();
  const SIDEBAR_CATS = ['Football', 'Motorsports'];
  const UPCOMING_ORDER = ['Basketball', 'Combat Sports'];
  const upcoming = filtered
    .filter(e => getStatus(e) === 'upcoming' && !SIDEBAR_CATS.includes(e.category_name || e.category || ''))
    .sort((a, b) => {
      const idx = cat => { const i = UPCOMING_ORDER.indexOf(cat); return i === -1 ? 99 : i; };
      return idx(a.category_name || a.category || '') - idx(b.category_name || b.category || '');
    });
  const ended    = filtered.filter(e => getStatus(e) === 'ended');

  document.getElementById('global-state').style.display = 'none';
  const motorsportsUpcoming = allEvents.filter(e => getStatus(e) === 'upcoming' && (e.category_name || e.category || '') === 'Motorsports');
  const sidebarEvents = [...allEvents.filter(e => getStatus(e) === 'live'), ...motorsportsUpcoming]
    .filter(e => !(e.name || '').toLowerCase().includes('24/7 cows'))
    .sort((a, b) => {
      const catOrder = cat => {
        if (cat === 'Tennis') return 0;
        if (cat === 'Motorsports') return 1;
        return 2;
      };
      return catOrder(a.category_name || a.category || '') - catOrder(b.category_name || b.category || '');
    });
  renderSidebar(sidebarEvents);

  const upSec = document.getElementById('upcoming-section');
  upSec.style.display = upcoming.length ? '' : 'none';
  if (upcoming.length) { document.getElementById('upcoming-section-count').textContent = upcoming.length; setGrid('upcoming-grid', upcoming); }

  const endSec = document.getElementById('ended-section');
  endSec.style.display = ended.length ? '' : 'none';
  if (ended.length) { document.getElementById('ended-section-count').textContent = ended.length; setGrid('ended-grid', ended); }

  if (!upcoming.length && !ended.length) {
    document.getElementById('global-state').style.display = '';
    document.getElementById('global-state').innerHTML = '<div class="no-results">Sin resultados.</div>';
  }
}

/* ── STATS ── */
function updateStats() {
  const live     = allEvents.filter(e => getStatus(e) === 'live').length;
  const upcoming = allEvents.filter(e => getStatus(e) === 'upcoming').length;
  document.getElementById('st-live').textContent     = live;
  document.getElementById('st-upcoming').textContent = upcoming;
  document.getElementById('st-total').textContent    = allEvents.length;
  document.getElementById('stats-bar').style.display = '';

}

/* ── LOAD ── */
async function loadEvents() {
  try {
    const res  = await fetch('https://api.ppv.to/api/streams');
    const data = await res.json();
    const events = [];
    (data.streams || []).forEach(cat => (cat.streams || []).forEach(s => {
      if (!BLOCKED.includes(s.name)) events.push(s);
    }));
    allEvents = events;
    updateStats();
    buildTicker(events);
    render();
  } catch (err) {
    console.error(err);
    document.getElementById('global-state').innerHTML = '<div class="no-results">Error cargando eventos. Reintentando…</div>';
  }
}

2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   STATE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nlet allEvents    = [];\nlet scheduleData = {};\nlet channelLogos = {};\nlet activeCat    = 'all';\nlet activeSchedDay = 'all';\nlet activeTab    = 'canales';\nlet searchQuery  = '';\nlet selectedId   = null;\nlet currentSources = [];\nlet upcomingCat = 'F\u00fatbol';\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   HELPERS\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction getStatus(ev) {\n  const now = Math.floor(Date.now() / 1000);\n  if (ev.always_live === 1) return 'live';\n  if (!ev.starts_at) return 'unknown';\n  if (now < ev.starts_at) return 'upcoming';\n  if (now >= ev.starts_at && now <= (ev.ends_at || ev.starts_at + 7200)) return 'live';\n  return 'ended';\n}\nfunction fmtTime(ts) {\n  if (!ts) return '';\n  return new Date(ts * 1000).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});\n}\nfunction fmtDuration(ev) {\n  if (!ev.starts_at) return '';\n  const now = Math.floor(Date.now() / 1000);\n  if (now < ev.starts_at) {\n    const mins = Math.round((ev.starts_at - now) / 60);\n    return mins < 60 ? `En ${mins}m` : `En ${Math.floor(mins/60)}h ${mins%60}m`;\n  }\n  if (ev.ends_at && now < ev.ends_at) {\n    const mins = Math.round((ev.ends_at - now) / 60);\n    return mins < 60 ? `Termina en ${mins}m` : `Termina en ${Math.floor(mins/60)}h ${mins%60}m`;\n  }\n  return '';\n}\nfunction getLogo(ev) {\n  if (ev.logo_url) return ev.logo_url.startsWith('http') ? ev.logo_url : DLHD_LOGO + ev.logo_url;\n  if (ev.channel_id && channelLogos[ev.channel_id]) {\n    const l = channelLogos[ev.channel_id];\n    return l.startsWith('http') ? l : DLHD_LOGO + l;\n  }\n  return '';\n}\nconst CAT_COLORS = {\n  'F\u00fatbol':'#ffffff','Football':'#c8a060','Basketball':'#cf5236','Tennis':'#b08715',\n  'MMA':'#ff1744','Boxing':'#c73e55','Baseball':'#b6bbdb','Hockey':'#1687c4',\n  'Formula 1':'#eb4034','Golf':'#20BA21','Volleyball':'#a708c7','Wrestling':'#D40000',\n  'Canales ARG':'#74b9ff','Canales INT':'#a29bfe',\n};\nfunction catColor(cat) {\n  for (const [k,v] of Object.entries(CAT_COLORS))\n    if (cat && cat.toLowerCase().includes(k.toLowerCase())) return v;\n  return '#5a6077';\n}\nfunction esc(s) { return s.replace(/'/g,\"\\\\'\"); }\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   CLOCK\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction updateClock() {\n  const _hc = document.getElementById('header-clock'); if (_hc) _hc.textContent =\n    new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});\n}\nupdateClock(); setInterval(updateClock, 1000);\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   TAB SWITCH\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction switchTab(tab) {\n  activeTab = tab;\n  document.getElementById('tab-canales').classList.toggle('active', tab==='canales');\n  document.getElementById('tab-programacion').classList.toggle('active', tab==='programacion');\n  document.getElementById('panel-canales').style.display      = tab==='canales'      ? 'flex' : 'none';\n  document.getElementById('panel-programacion').style.display = tab==='programacion' ? 'flex' : 'none';\n  if (tab==='programacion') renderSchedule();\n}\nfunction openScheduleTab() {\n  switchTab('programacion');\n  document.getElementById('scheduleSidebar').classList.remove('collapsed');\n  if (window.innerWidth <= 900) {\n    document.getElementById('scheduleSidebar').classList.add('open');\n    document.getElementById('sidebarOverlay').classList.add('open');\n  }\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   SIDEBAR\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\ndocument.getElementById('sidebar-head-toggle').addEventListener('click', () => {\n  const sb = document.getElementById('scheduleSidebar');\n  const ch = document.getElementById('sidebar-chevron');\n  const collapsed = sb.classList.toggle('collapsed');\n  ch.style.transform = collapsed ? 'rotate(180deg)' : '';\n});\nfunction toggleSidebar() {\n  document.getElementById('scheduleSidebar').classList.toggle('open');\n  document.getElementById('sidebarOverlay').classList.toggle('open');\n}\nfunction closeSidebar() {\n  document.getElementById('scheduleSidebar').classList.remove('open');\n  document.getElementById('sidebarOverlay').classList.remove('open');\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   HEADER UPDATE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction updateHeader() {\n  const live = allEvents.filter(e => getStatus(e)==='live').length;\n\n\n  const hasSched = Object.keys(scheduleData).length > 0;\n  const sp = document.getElementById('schedule-pill');\n  if (sp) sp.style.display = hasSched ? '' : 'none';\n  if (hasSched && sp) {\n    sp.classList.add('has-data');\n    const total = Object.values(scheduleData).reduce((a,cats) =>\n      a + Object.values(cats).reduce((b,evs) => b + evs.length, 0), 0);\n    const spt = document.getElementById('schedule-pill-text');\n    if (spt) spt.textContent = `${total} EVENTOS`;\n  }\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   CHANNELS RENDER\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction filteredEvents() {\n  const q = searchQuery.toLowerCase().trim();\n  return allEvents.filter(ev => {\n    const st = getStatus(ev);\n    if      (activeCat==='live')     { if (st!=='live') return false; }\n    else if (activeCat==='upcoming') { if (st!=='upcoming') return false; }\n    else if (activeCat!=='all')      { if ((ev.category_name||ev.category||'')!==activeCat) return false; }\n    if (q) {\n      const n = (ev.name||ev.title||'').toLowerCase();\n      const c = (ev.category_name||ev.category||'').toLowerCase();\n      if (!n.includes(q) && !c.includes(q)) return false;\n    }\n    return true;\n  });\n}\n\nfunction normalizeCat(cat) {\n  const c = (cat||'').trim();\n  if (['American Football','Australian Football','Rugby'].includes(c)) return 'Rugby';\n  if (c === 'Football') return 'F\u00fatbol';\n  if (['Wrestling','Arm Wrestling','Combat Sports'].includes(c)) return 'Pelea';\n  if (c === 'Motorsports') return 'Motor Sports / F1';\n  return c;\n}\n\nfunction renderEventList() {\n  const list = document.getElementById('event-list');\n  const q = searchQuery.toLowerCase().trim();\n  const all = allEvents.filter(ev => {\n    if (!q) return true;\n    const n = (ev.name||ev.title||'').toLowerCase();\n    const c = (ev.category_name||ev.category||'').toLowerCase();\n    return n.includes(q) || c.includes(q);\n  });\n  const live     = all.filter(e => getStatus(e)==='live');\n  const upcoming = all.filter(e => getStatus(e)==='upcoming');\n  document.getElementById('sidebar-count').textContent = live.length + upcoming.length;\n\n  const upcomingAll = all.filter(e => getStatus(e)==='upcoming');\n  const upcomingCats = [...new Set(upcomingAll.map(e=>normalizeCat(e.category_name||e.category||'')).filter(Boolean))];\n\n  // Filter upcoming by selected cat (using normalized names)\n  const filteredUpcoming = upcomingCat==='all'\n    ? upcomingAll\n    : upcomingAll.filter(e=>normalizeCat(e.category_name||e.category||'')===upcomingCat);\n\n  // Pills HTML \u2014 fixed order, only show if cat has events\n  const pillOrder = ['all','F\u00fatbol','Motor Sports / F1','Basketball','Pelea','Hockey','Baseball'];\n  const pillLabels = {'all':'Todos','F\u00fatbol':'F\u00fatbol','Motor Sports / F1':'Motor Sports / F1','Basketball':'Basquet','Pelea':'Pelea','Hockey':'Hockey','Baseball':'Baseball'};\n  const availablePills = pillOrder.filter(c => c==='all' || upcomingCats.includes(c));\n  const pillsHtml = availablePills.length > 1\n    ? `<div style=\"display:flex;flex-wrap:wrap;gap:5px;padding:6px 10px 8px;border-bottom:1px solid var(--border);\">` +\n      availablePills.map(c => `<span class=\"cat-pill ${upcomingCat===c?'active':''}\" onclick=\"setUpcomingCat('${c}')\">${pillLabels[c]||c}</span>`).join('') +\n      `</div>`\n    : '';\n\n  let html = '';\n  if (live.length) {\n    html += `<div class=\"section-label\" id=\"live-section-label\" onclick=\"toggleLiveSection()\" style=\"cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding-right:12px;\">\n      <span style=\"display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid rgba(227,28,28,.35);border-radius:3px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--red);font-family:'Barlow Condensed',sans-serif;\"><span style=\"width:12px;height:1px;background:rgba(227,28,28,.5);display:inline-block;\"></span>LIVE</span>\n      <span id=\"live-chevron\" style=\"font-size:10px;color:var(--muted);transition:transform .2s;\">${liveCollapsed?'\u25b6':'\u25bc'}</span>\n    </div>`;\n    if (!liveCollapsed) html += `<div id=\"live-section-rows\">` + live.map(rowHTML).join('') + `</div>`;\n    if (upcomingAll.length) html += '<div class=\"section-divider\"></div>';\n  }\n  if (upcomingAll.length) {\n    html += `<div class=\"section-label\">\ud83d\udd52 Pr\u00f3ximos</div>` + pillsHtml + filteredUpcoming.map(rowHTML).join('');\n  }\n  if (!html) html = `<div style=\"padding:32px 16px;text-align:center;color:var(--muted);font-size:13px;\">Sin resultados</div>`;\n\n  list.innerHTML = html;\n  if (selectedId) list.querySelectorAll(`.event-row[data-id=\"${selectedId}\"]`).forEach(r=>r.classList.add('selected'));\n}\n\nlet liveCollapsed = false;\nfunction toggleLiveSection() {\n  liveCollapsed = !liveCollapsed;\n  renderEventList();\n  if (liveCollapsed) document.getElementById('event-list').scrollTop = 0;\n}\n\nfunction setUpcomingCat(cat) {\n  upcomingCat = cat;\n  renderEventList();\n}\n\nfunction rowHTML(ev) {\n  const status = getStatus(ev);\n  const title  = ev.name || ev.title || 'Sin t\u00edtulo';\n  const cat    = ev.category_name || ev.category || '';\n  const time   = fmtTime(ev.starts_at);\n  const color  = catColor(cat);\n  const isSel  = String(ev.id)===String(selectedId);\n  const logo   = getLogo(ev);\n  const dur    = (status==='upcoming'||status==='live') ? fmtDuration(ev) : '';\n  const logoEl = logo\n    ? `<img class=\"ev-logo\" src=\"${logo}\" alt=\"\" onerror=\"this.style.display='none'\">`\n    : '';\n  const liveBadge = `<span class=\"ev-live-badge\"><span class=\"ev-live-dash\"></span></span>`;\n  const clickAttr = status!=='upcoming' ? `onclick=\"selectEvent('${ev.id}')\"` : '';\n  const upcomingStyle = status==='upcoming' ? 'cursor:default;pointer-events:none;opacity:.8;' : '';\n  return `\n  <div class=\"event-row ${status==='live'?'is-live':''} ${isSel?'selected':''}\" data-id=\"${ev.id}\" ${clickAttr} style=\"${upcomingStyle}\">\n    ${logoEl}\n    ${status==='live' ? liveBadge : `<span class=\"ev-time\">${time||'\u2014'}</span>`}\n    <div class=\"ev-info\">\n      <div class=\"ev-name\">${title}</div>\n      ${dur?`<div class=\"ev-sub\">${dur}</div>`:(cat?`<div class=\"ev-sub\">${cat}</div>`:'')}\n    </div>\n  </div>`;\n}\n\nfunction buildCatPills() { /* pills removed */ }\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   SCHEDULE RENDER\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction renderSchedule() {\n  const list = document.getElementById('sched-list');\n  const days = Object.keys(scheduleData);\n\n  if (!days.length) {\n    list.innerHTML = DLHD_KEY\n      ? `<div style=\"padding:32px 16px;text-align:center;color:var(--muted);font-size:13px;\">No se pudo cargar la programaci\u00f3n</div>`\n      : `<div class=\"no-key-notice\">\n           <strong>\u26a1 Conect\u00e1 la programaci\u00f3n en vivo</strong>\n           Para ver el horario completo del d\u00eda desde dlhd.pk, ingres\u00e1 tu API key en el archivo HTML:<br><br>\n           <code>const DLHD_KEY = 'tu-key-aqui';</code><br><br>\n           Contact\u00e1 al soporte de dlhd.pk para obtener tu key.\n         </div>`;\n    return;\n  }\n\n  // Day pills\n  const pillWrap = document.getElementById('sched-pills');\n  pillWrap.innerHTML = days.map((d,i) => {\n    const key = i===0 ? 'all' : d;\n    const label = d.split(' ').slice(0,3).join(' ');\n    return `<span class=\"sched-pill cat-pill ${activeSchedDay===key?'active':''}\" data-day=\"${key}\">${label}</span>`;\n  }).join('');\n  pillWrap.querySelectorAll('.sched-pill').forEach(p => {\n    p.addEventListener('click', () => {\n      pillWrap.querySelectorAll('.sched-pill').forEach(x=>x.classList.remove('active'));\n      activeSchedDay = p.dataset.day; p.classList.add('active');\n      renderScheduleList();\n    });\n  });\n  renderScheduleList();\n}\n\nfunction renderScheduleList() {\n  const list = document.getElementById('sched-list');\n  const days = Object.keys(scheduleData);\n  const targets = activeSchedDay==='all' ? [days[0]] : [activeSchedDay];\n  const q = searchQuery.toLowerCase().trim();\n  let html = '';\n\n  targets.forEach(day => {\n    const cats = scheduleData[day];\n    if (!cats) return;\n    html += `<div class=\"sched-day-header\">${day}</div>`;\n    Object.entries(cats).forEach(([catName, evs]) => {\n      const filtered = evs.filter(ev => {\n        if (!q) return true;\n        return ev.event.toLowerCase().includes(q) || ev.channels.some(c=>c.channel_name.toLowerCase().includes(q));\n      });\n      if (!filtered.length) return;\n      html += `<div class=\"sched-cat-header\">${catName}</div>`;\n      filtered.forEach(ev => {\n        const chips = ev.channels.slice(0,5).map(ch => {\n          const lu = ch.logo_url ? (ch.logo_url.startsWith('http')?ch.logo_url:DLHD_LOGO+ch.logo_url) : '';\n          const logoImg = lu ? `<img class=\"sched-ch-logo\" src=\"${lu}\" alt=\"\" onerror=\"this.style.display='none'\">` : '';\n          return `<span class=\"sched-ch-chip\" onclick=\"playChannel('${ch.channel_id}','${esc(ch.channel_name)}')\" title=\"${ch.channel_name}\">${logoImg}${ch.channel_name}</span>`;\n        }).join('');\n        html += `\n        <div class=\"sched-event-row\">\n          <span class=\"sched-ev-time\">${ev.time}</span>\n          <div class=\"sched-ev-info\">\n            <div class=\"sched-ev-name\">${ev.event}</div>\n            ${chips?`<div class=\"sched-ev-channels\">${chips}</div>`:''}\n          </div>\n        </div>`;\n      });\n    });\n  });\n\n  list.innerHTML = html || `<div style=\"padding:32px 16px;text-align:center;color:var(--muted);font-size:13px;\">Sin resultados</div>`;\n}\n\n/* Play a channel from schedule by channel_id */\nfunction playChannel(channelId, channelName) {\n  const fixed = FIXED_EVENTS.find(e => String(e.channel_id)===String(channelId));\n  if (fixed) { loadPlayer(fixed); closeSidebar(); return; }\n  // Synthetic event using dlhd URL patterns\n  const existing = allEvents.find(e => e.id===`dlhd-${channelId}`);\n  const synth = existing || {\n    id: `dlhd-${channelId}`, name: channelName, category_name: '', channel_id: channelId, always_live: 1,\n    sources: [\n      {lang:'', quality:'Fuente 1', iframe:`${DLHD_BASE}/stream/stream-${channelId}.php`},\n      {lang:'', quality:'Fuente 2', iframe:`${DLHD_BASE}/watch/stream-${channelId}.php`},\n      {lang:'', quality:'Fuente 3', iframe:`${DLHD_BASE}/plus/stream-${channelId}.php`},\n      {lang:'', quality:'Fuente 4', iframe:`${DLHD_BASE}/casting/stream-${channelId}.php`},\n    ],\n  };\n  if (!existing) allEvents.push(synth);\n  loadPlayer(synth);\n  closeSidebar();\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   PLAYER\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction selectEvent(id) {\n  const ev = allEvents.find(e => String(e.id)===String(id));\n  if (!ev) return;\n  loadPlayer(ev);\n  if (window.innerWidth <= 900) closeSidebar();\n}\n\nfunction collectSources(ev) {\n  const out = [];\n  if (Array.isArray(ev.sources) && ev.sources.length) {\n    ev.sources.forEach(s => {\n      const url = s.iframe||s.url||s.src||'';\n      if (!url) return;\n      const lang    = s.lang||s.language||'';\n      const quality = s.quality||s.hd||'';\n      const label   = [lang,quality].filter(Boolean).join(' \u00b7 ') || `Fuente ${out.length+1}`;\n      out.push({label,lang,quality,url});\n    });\n    if (out.length) return out;\n  }\n  if (Array.isArray(ev.streams) && ev.streams.length) {\n    ev.streams.forEach((s,i) => {\n      const url = s.iframe||s.url||s.src||'';\n      if (!url) return;\n      out.push({label:s.label||s.name||`Fuente ${i+1}`,lang:'',quality:'',url});\n    });\n    if (out.length) return out;\n  }\n  if (ev.iframe)  out.push({label:'HD',  lang:'',quality:'HD', url:ev.iframe});\n  if (ev.iframe2) out.push({label:'HD 2',lang:'',quality:'HD', url:ev.iframe2});\n  if (ev.iframe3) out.push({label:'SD',  lang:'',quality:'SD', url:ev.iframe3});\n  return out;\n}\n\nfunction renderSourceButtons(sources) {\n  const sl = document.getElementById('sources-list');\n  const hasLang = sources.some(s=>s.lang);\n  if (hasLang) {\n    const byLang = {};\n    sources.forEach(s => { (byLang[s.lang||'\u2014']=byLang[s.lang||'\u2014']||[]).push(s); });\n    let html='', gi=0;\n    Object.entries(byLang).forEach(([lang,srcs]) => {\n      html += `<span class=\"sources-lang-label\">${lang}:</span>`;\n      srcs.forEach(s => {\n        const enc = encodeURIComponent(s.url);\n        html += `<button class=\"source-btn${gi===0?' active':''}\" onclick=\"switchSource(this,'${enc}')\">${s.quality||'HD'}</button>`;\n        gi++;\n      });\n    });\n    sl.innerHTML = html;\n  } else {\n    sl.innerHTML = sources.map((s,i) => {\n      const enc = encodeURIComponent(s.url);\n      return `<button class=\"source-btn${i===0?' active':''}\" onclick=\"switchSource(this,'${enc}')\">${s.label}</button>`;\n    }).join('');\n  }\n}\n\nfunction loadPlayer(ev) {\n  selectedId = ev.id;\n  const shell=document.getElementById('player-shell');\n  const idle=document.getElementById('player-idle');\n  const noStream=document.getElementById('no-stream');\n  const srcBar=document.getElementById('sources-bar');\n\n  shell.querySelectorAll('iframe').forEach(el=>el.remove());\n  idle.style.display='none';\n  noStream.classList.remove('visible');\n  srcBar.classList.remove('visible');\n\n  const status  = getStatus(ev);\n  const sources = collectSources(ev);\n  currentSources = sources;\n\n  if (sources.length) {\n    loadIframe(sources[0].url);\n    if (sources.length>1) { renderSourceButtons(sources); srcBar.classList.add('visible'); }\n  } else if (status==='upcoming') {\n    idle.style.display=''; idle.querySelector('p').textContent='El stream estar\u00e1 disponible cuando comience el evento';\n    noStream.classList.add('visible');\n  } else {\n    idle.style.display=''; idle.querySelector('p').textContent='Reproducci\u00f3n no disponible para este evento';\n  }\n\n  const title = ev.name||ev.title||'';\n  const cat   = ev.category_name||ev.category||'';\n  const dur   = fmtDuration(ev);\n  const logo  = getLogo(ev);\n\n  document.getElementById('player-idle-label').style.display='none';\n\n  const logoEl = document.getElementById('player-ev-logo');\n  if (logo) { logoEl.src=logo; logoEl.style.display=''; }\n  else { logoEl.style.display='none'; }\n\n  const nm=document.getElementById('player-ev-name');\n  const ct=document.getElementById('player-ev-cat');\n  const ti=document.getElementById('player-ev-time-info');\n  const fs=document.getElementById('btn-fullscreen');\n\n  nm.style.display=''; nm.textContent=title;\n  ct.style.display=cat?'':'none'; ct.textContent=cat;\n  ti.style.display=dur?'':'none'; ti.textContent=dur;\n  fs.style.display=sources.length?'':'none';\n\n  document.querySelectorAll('.event-row').forEach(r=>\n    r.classList.toggle('selected', String(r.dataset.id)===String(ev.id))\n  );\n  document.title = title ? `${title} \u00b7 VicioTV` : 'VicioTV';\n}\n\nwindow.open = () => null;\n\nfunction loadIframe(raw) {\n  const shell = document.getElementById('player-shell');\n  shell.querySelectorAll('iframe').forEach(el=>el.remove());\n  let src = raw;\n  try { src = decodeURIComponent(src); } catch(e) {}\n  const iframe = document.createElement('iframe');\n  iframe.src = src;\n  iframe.setAttribute('sandbox','allow-scripts allow-same-origin allow-presentation allow-forms');\n  iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';\n  iframe.allowFullscreen = true;\n  iframe.setAttribute('scrolling','no');\n  shell.appendChild(iframe);\n}\n\nfunction switchSource(btn, enc) {\n  document.querySelectorAll('.source-btn').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active'); loadIframe(enc);\n}\n\nfunction goFullscreen() {\n  const shell = document.getElementById('player-shell');\n  const target = shell.querySelector('iframe') || shell;\n  if (target.requestFullscreen)            target.requestFullscreen();\n  else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();\n  else if (target.mozRequestFullScreen)    target.mozRequestFullScreen();\n}\n\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   TICKER\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n\nfunction getFlag(country) {\n  const flags = {\n    // Am\u00e9rica\n    'Argentina': '\ud83c\udde6\ud83c\uddf7', 'Brazil': '\ud83c\udde7\ud83c\uddf7', 'Brasil': '\ud83c\udde7\ud83c\uddf7',\n    'Uruguay': '\ud83c\uddfa\ud83c\uddfe', 'Colombia': '\ud83c\udde8\ud83c\uddf4', 'Chile': '\ud83c\udde8\ud83c\uddf1',\n    'Peru': '\ud83c\uddf5\ud83c\uddea', 'Per\u00fa': '\ud83c\uddf5\ud83c\uddea', 'Ecuador': '\ud83c\uddea\ud83c\udde8',\n    'Bolivia': '\ud83c\udde7\ud83c\uddf4', 'Paraguay': '\ud83c\uddf5\ud83c\uddfe', 'Venezuela': '\ud83c\uddfb\ud83c\uddea',\n    'Mexico': '\ud83c\uddf2\ud83c\uddfd', 'M\u00e9xico': '\ud83c\uddf2\ud83c\uddfd', 'USA': '\ud83c\uddfa\ud83c\uddf8',\n    'United States': '\ud83c\uddfa\ud83c\uddf8', 'Canada': '\ud83c\udde8\ud83c\udde6', 'Costa Rica': '\ud83c\udde8\ud83c\uddf7',\n    'Honduras': '\ud83c\udded\ud83c\uddf3', 'Panama': '\ud83c\uddf5\ud83c\udde6', 'Panam\u00e1': '\ud83c\uddf5\ud83c\udde6',\n    'Jamaica': '\ud83c\uddef\ud83c\uddf2', 'Trinidad and Tobago': '\ud83c\uddf9\ud83c\uddf9',\n    // Europa\n    'Spain': '\ud83c\uddea\ud83c\uddf8', 'Espa\u00f1a': '\ud83c\uddea\ud83c\uddf8', 'France': '\ud83c\uddeb\ud83c\uddf7',\n    'Germany': '\ud83c\udde9\ud83c\uddea', 'England': '\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc65\udb40\udc6e\udb40\udc67\udb40\udc7f', 'Italy': '\ud83c\uddee\ud83c\uddf9',\n    'Portugal': '\ud83c\uddf5\ud83c\uddf9', 'Netherlands': '\ud83c\uddf3\ud83c\uddf1', 'Belgium': '\ud83c\udde7\ud83c\uddea',\n    'Croatia': '\ud83c\udded\ud83c\uddf7', 'Serbia': '\ud83c\uddf7\ud83c\uddf8', 'Poland': '\ud83c\uddf5\ud83c\uddf1',\n    'Switzerland': '\ud83c\udde8\ud83c\udded', 'Denmark': '\ud83c\udde9\ud83c\uddf0', 'Sweden': '\ud83c\uddf8\ud83c\uddea',\n    'Norway': '\ud83c\uddf3\ud83c\uddf4', 'Austria': '\ud83c\udde6\ud83c\uddf9', 'Czech Republic': '\ud83c\udde8\ud83c\uddff',\n    'Slovakia': '\ud83c\uddf8\ud83c\uddf0', 'Hungary': '\ud83c\udded\ud83c\uddfa', 'Romania': '\ud83c\uddf7\ud83c\uddf4',\n    'Scotland': '\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc73\udb40\udc63\udb40\udc74\udb40\udc7f', 'Wales': '\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc77\udb40\udc6c\udb40\udc73\udb40\udc7f', 'Turkey': '\ud83c\uddf9\ud83c\uddf7',\n    'Ukraine': '\ud83c\uddfa\ud83c\udde6', 'Greece': '\ud83c\uddec\ud83c\uddf7', 'Albania': '\ud83c\udde6\ud83c\uddf1',\n    'Slovenia': '\ud83c\uddf8\ud83c\uddee', 'Georgia': '\ud83c\uddec\ud83c\uddea',\n    // \u00c1frica\n    'Morocco': '\ud83c\uddf2\ud83c\udde6', 'Marruecos': '\ud83c\uddf2\ud83c\udde6', 'Senegal': '\ud83c\uddf8\ud83c\uddf3',\n    'Nigeria': '\ud83c\uddf3\ud83c\uddec', 'Ghana': '\ud83c\uddec\ud83c\udded', 'Cameroon': '\ud83c\udde8\ud83c\uddf2',\n    'Egypt': '\ud83c\uddea\ud83c\uddec', 'South Africa': '\ud83c\uddff\ud83c\udde6', 'Tunisia': '\ud83c\uddf9\ud83c\uddf3',\n    'Mali': '\ud83c\uddf2\ud83c\uddf1', 'Ivory Coast': '\ud83c\udde8\ud83c\uddee', 'Algeria': '\ud83c\udde9\ud83c\uddff',\n    // Asia / Ocean\u00eda\n    'Japan': '\ud83c\uddef\ud83c\uddf5', 'South Korea': '\ud83c\uddf0\ud83c\uddf7', 'Korea Republic': '\ud83c\uddf0\ud83c\uddf7',\n    'Australia': '\ud83c\udde6\ud83c\uddfa', 'Saudi Arabia': '\ud83c\uddf8\ud83c\udde6', 'Iran': '\ud83c\uddee\ud83c\uddf7',\n    'Qatar': '\ud83c\uddf6\ud83c\udde6', 'China': '\ud83c\udde8\ud83c\uddf3', 'Indonesia': '\ud83c\uddee\ud83c\udde9',\n    'New Zealand': '\ud83c\uddf3\ud83c\uddff',\n  };\n  // Try exact match first, then partial\n  if (flags[country]) return flags[country];\n  for (const [k,v] of Object.entries(flags)) {\n    if (country.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(country.toLowerCase())) return v;\n  }\n  return '';\n}\n\nfunction addFlagsToName(name) {\n  // Match \"Team A vs Team B\" pattern\n  const match = name.match(/^(.+?)\\s+vs\\.?\\s+(.+)$/i);\n  if (!match) return name;\n  const a = match[1].trim();\n  const b = match[2].trim();\n  const fa = getFlag(a);\n  const fb = getFlag(b);\n  return `${fa}${fa?' ':''}${a} vs ${fb}${fb?' ':''}${b}`;\n}\nfunction buildTicker(events) {\n  const bar = document.getElementById('ticker-bar');\n  const wrap = document.getElementById('ticker-sections');\n  const catConfig = [\n    { key: 'F\u00fatbol',          label: 'MUNDIAL 2026' },\n    { key: 'Basketball',      label: 'BASQUET' },\n    { key: 'Pelea',           label: 'PELEA' },\n    { key: 'Motor Sports / F1', label: 'MOTOR SPORTS / F1' },\n  ];\n  const _now = Math.floor(Date.now()/1000);\n  const upcoming = events.filter(e => !e.always_live && (getStatus(e)==='live' || (e.starts_at && _now < e.starts_at)));\n\n  let sections = '';\n  catConfig.forEach(({key, label}) => {\n    const evs = upcoming.filter(e => normalizeCat(e.category_name||e.category||'')===key);\n    if (!evs.length) return;\n    const items = evs.map(e => {\n      const rawName = e.name||e.title||'';\n      const name = key==='F\u00fatbol' ? addFlagsToName(rawName) : rawName;\n      const d = new Date(e.starts_at*1000);\n      const time = d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) + ' ' + d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});\n      return `<span class=\"ticker-item\">${name}<span class=\"ticker-time\">${time}</span></span><span class=\"ticker-sep\">\u00b7</span>`;\n    }).join('');\n    sections += `<span class=\"ticker-section\"><span class=\"ticker-cat-label\">${label}</span>${items}</span>`;\n  });\n\n  if (!sections) { bar.style.display='none'; return; }\n\n  // Duplicate for seamless loop\n  wrap.innerHTML = sections + sections;\n  bar.style.display = '';\n\n  // Set animation duration based on content width\n  requestAnimationFrame(() => {\n    const totalW = wrap.scrollWidth / 2;\n    const speed = 80; // px per second\n    wrap.style.animationDuration = (totalW / speed) + 's';\n  });\n}\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   FETCH \u2014 ppv.to\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nasync function loadStreams() {\n  // Mostrar canales fijos de inmediato\n  allEvents = [...FIXED_EVENTS];\n  updateHeader(); buildCatPills(); renderEventList();\n  if (!selectedId) loadPlayer(FIXED_EVENTS[0]);\n\n  // Luego intentar cargar pr\u00f3ximos de ppv.to\n  try {\n    const controller = new AbortController();\n    setTimeout(() => controller.abort(), 8000);\n    const res  = await fetch('https://api.ppv.to/api/streams', { signal: controller.signal });\n    const data = await res.json();\n    const events = [];\n    if (Array.isArray(data.streams)) {\n      data.streams.forEach(cat => {\n        if (Array.isArray(cat.streams)) cat.streams.forEach(s=>events.push(s));\n        else if (cat.id||cat.title||cat.name) events.push(cat);\n      });\n    } else if (Array.isArray(data))       data.forEach(s=>events.push(s));\n    else if (Array.isArray(data.events))  data.events.forEach(s=>events.push(s));\n    else if (Array.isArray(data.data))    data.data.forEach(s=>events.push(s));\n\n    const upcomingOnly = events.filter(e => !e.always_live && e.starts_at && Math.floor(Date.now()/1000) < e.starts_at);\n    if (upcomingOnly.length) {\n      allEvents = [...FIXED_EVENTS, ...upcomingOnly];\n      updateHeader(); buildCatPills(); renderEventList();\n      buildTicker(upcomingOnly);\n    }\n  } catch(err) {\n    console.warn('[VicioTV] ppv.to no disponible:', err.message);\n  }\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   FETCH \u2014 dlhd.pk channels (logos)\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nasync function loadDlhdChannels() {\n  if (!DLHD_KEY) return;\n  try {\n    const res  = await fetch(`${DLHD_BASE}/daddyapi.php?key=${DLHD_KEY}&endpoint=channels`);\n    const data = await res.json();\n    if (data.success && Array.isArray(data.data)) {\n      data.data.forEach(ch => { if (ch.channel_id && ch.logo_url) channelLogos[ch.channel_id] = ch.logo_url; });\n      renderEventList();\n    }\n  } catch(err) { console.warn('[VicioTV] logos error:', err.message); }\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   FETCH \u2014 dlhd.pk schedule\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nasync function loadDlhdSchedule() {\n  if (!DLHD_KEY) return;\n  try {\n    const res  = await fetch(`${DLHD_BASE}/daddyapi.php?key=${DLHD_KEY}&endpoint=schedule`);\n    const data = await res.json();\n    if (data.success && data.data && typeof data.data==='object') {\n      scheduleData = data.data;\n      updateHeader();\n      if (activeTab==='programacion') renderSchedule();\n    }\n  } catch(err) { console.warn('[VicioTV] schedule error:', err.message); }\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   REFRESH\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nasync function refreshAll() {\n  const btn = document.getElementById('btn-refresh');\n  btn.classList.add('spinning');\n  await Promise.allSettled([loadStreams(), loadDlhdChannels(), loadDlhdSchedule()]);\n  btn.classList.remove('spinning');\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   SEARCH\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 var tv2Loaded = false;
var tv1SavedIframes = [];

var origSwitchTab = switchTab;
switchTab = function(tab) {
  // Pause TV1 iframes when leaving, restore when coming back
  var ratio = document.getElementById('player-ratio');
  if (tab === 'tv2' && ratio) {
    ratio.querySelectorAll('iframe').forEach(function(iframe) {
      tv1SavedIframes.push({ src: iframe.src, parent: iframe.parentNode });
      iframe.remove();
    });
  }
  if (tab === 'tv1' && tv1SavedIframes.length) {
    tv1SavedIframes.forEach(function(saved) {
      var iframe = document.createElement('iframe');
      iframe.src = saved.src;
      iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;background:#000';
      saved.parent.appendChild(iframe);
    });
    tv1SavedIframes = [];
  }

  origSwitchTab(tab);

  if ((tab === 'tv2' || tab === 'channels') && !tv2Loaded) {
    tv2Loaded = true;
    var iframe = document.getElementById('tv2-iframe');
    var blob = new Blob([TV2_HTML], {type: 'text/html'});
    iframe.src = URL.createObjectURL(blob);
  }

  if (tab === 'channels') {
    var callOpen = function(attempts) {
      var f = document.getElementById('tv2-iframe');
      if (f && f.contentWindow && f.contentWindow.openAllChannels) {
        f.contentWindow.openAllChannels();
      } else if (attempts > 0) {
        setTimeout(function() { callOpen(attempts - 1); }, 300);
      }
    };
    callOpen(10);
  }

  if (tab === 'tv2') {
    var f = document.getElementById('tv2-iframe');
    if (f && f.contentWindow && f.contentWindow.closeAllChannels) {
      f.contentWindow.closeAllChannels();
    }
  }

  if (tab === 'tv1') { render(); }
};
